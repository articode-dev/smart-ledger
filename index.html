<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F172A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Smart Ledger">
  <meta name="mobile-web-app-capable" content="yes">

  <title>Smart Ledger — Digital Ledger for Everyone</title>
  <meta name="description" content="Smart Ledger is a fast, offline-first digital ledger app for personal and business use. Track balances, credit, and payments — anywhere in the world.">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>">

  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Open Graph -->
  <meta property="og:title" content="Smart Ledger — Digital Khata">
  <meta property="og:description" content="Modern digital ledger app for small businesses worldwide.">
  <meta property="og:type" content="website">
</head>
<body>

  <!-- App Root -->
  <div id="app" role="main" aria-label="Smart Ledger App">
    <!-- Loading splash -->
    <div id="splash" style="
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0F172A 0%, #1E3A5F 50%, #2563EB 100%);
      gap: 16px;
    ">
      <div style="font-size: 64px; animation: logoPulse 1.5s ease-in-out infinite;">📒</div>
      <div style="font-size: 28px; font-weight: 800; color: white; letter-spacing: -0.5px;">Smart Ledger</div>
      <div style="width: 40px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden; margin-top: 8px;">
        <div id="splash-bar" style="height: 100%; background: #10B981; border-radius: 2px; width: 0%; transition: width 0.8s ease;"></div>
      </div>
    </div>
  </div>

  <!-- Scripts — order matters! -->
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/router.js"></script>
  <script src="js/views/login.js"></script>
  <script src="js/views/setup.js"></script>
  <script src="js/views/dashboard.js"></script>
  <script src="js/views/customer.js"></script>
  <script src="js/views/detail.js"></script>
  <script src="js/views/transaction.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Animate splash bar then hide
    setTimeout(() => {
      const bar = document.getElementById('splash-bar');
      if (bar) bar.style.width = '100%';
    }, 50);
    setTimeout(() => {
      const splash = document.getElementById('splash');
      if (splash) splash.style.opacity = '0';
      setTimeout(() => { if (splash) splash.remove(); }, 300);
    }, 800);
  </script>

  <!-- PWA Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
